  <!-- right wing -->
  <path d="M100,100 Q150,40 160,80 Q170,120 130,130 Q140,100 100,100"/>
  <!-- upper left wing -->
  <path d="M100,100 Q65,55 55,90"/>
  <!-- upper right wing -->
