  <!-- head -->
  <circle cx="100" cy="100" r="8"/>
  <!-- antennae -->
  <line x1="96" y1="92" x2="88" y2="78"/>
  <line x1="104" y1="92" x2="112" y2="78"/>
  <circle cx="88" cy="76" r="3" fill="#222"/>
