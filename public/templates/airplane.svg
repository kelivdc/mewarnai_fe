<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="#fff" stroke="#222" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- fuselage -->
  <ellipse cx="100" cy="100" rx="80" ry="22"/>
  <!-- nose cone -->
  <path d="M180,100 Q190,100 185,90 L175,85 Q180,100 180,100"/>
  <!-- tail fin -->
  <path d="M22,98 L25,65 L40,80 L25,95 Z"/>
  <!-- wing -->
  <path d="M70,80 L90,55 L120,55 L135,80"/>
  <!-- engines -->
  <rect x="55" y="80" width="18" height="12" rx="3"/>
  <rect x="100" y="80" width="18" height="12" rx="3"/>
  <!-- windows -->
  <circle cx="140" cy="93" r="5"/>
  <circle cx="125" cy="93" r="5"/>
  <circle cx="110" cy="93" r="5"/>
  <circle cx="95" cy="93" r="5"/>
  <circle cx="80" cy="93" r="5"/>
  <circle cx="65" cy="93" r="5"/>
  <!-- wing details -->
  <line x1="90" y1="68" x2="100" y2="78"/>
  <line x1="110" y1="68" x2="110" y2="78"/>
  <!-- engine exhaust -->
  <path d="M55,92 Q45,95 50,100" stroke-width="2"/>
  <path d="M100,92 Q90,95 95,100" stroke-width="2"/>
</svg>
