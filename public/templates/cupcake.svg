<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="#fff" stroke="#222" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- wrapper -->
  <path d="M65,160 L70,110 L130,110 L135,160 Q130,170 100,170 Q70,170 65,160 Z"/>
  <!-- wrapper ridges -->
  <line x1="70" y1="120" x2="65" y2="160"/>
  <line x1="80" y1="115" x2="78" y2="162"/>
  <line x1="90" y1="111" x2="90" y2="164"/>
  <line x1="100" y1="110" x2="100" y2="165"/>
  <line x1="110" y1="111" x2="110" y2="164"/>
  <line x1="120" y1="115" x2="122" y2="162"/>
  <line x1="130" y1="120" x2="135" y2="160"/>
  <!-- cake base -->
  <rect x="62" y="80" width="76" height="32" rx="4"/>
