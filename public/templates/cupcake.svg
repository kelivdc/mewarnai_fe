  <!-- sprinkles on frosting -->
  <rect x="75" y="68" width="3" height="8" rx="1" transform="rotate(30,75,68)"/>
  <rect x="85" y="64" width="3" height="8" rx="1" transform="rotate(-20,85,64)"/>
  <rect x="105" y="66" width="3" height="8" rx="1" transform="rotate(45,105,66)"/>
  <rect x="115" y="70" width="3" height="8" rx="1" transform="rotate(-15,115,70)"/>
  <rect x="95" y="62" width="3" height="8" rx="1" transform="rotate(10,95,62)"/>
</svg>
