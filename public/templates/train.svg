<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="#fff" stroke="#222" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- engine body -->
  <rect x="55" y="80" width="90" height="45" rx="8"/>
  <!-- cab -->
  <rect x="40" y="50" width="50" height="50" rx="4"/>
  <!-- cab roof -->
  <path d="M35,50 L65,30 L95,50"/>
  <!-- window -->
  <rect x="45" y="58" width="40" height="22" rx="3"/>
  <!-- chimney -->
  <rect x="110" y="45" width="16" height="35" rx="3"/>
  <!-- smoke -->
  <circle cx="118" cy="38" r="10" fill="none"/>
  <circle cx="128" cy="28" r="8" fill="none"/>
  <circle cx="118" cy="18" r="6" fill="none"/>
  <!-- wheels -->
  <circle cx="65" cy="135" r="12"/>
  <circle cx="65" cy="135" r="5"/>
  <circle cx="100" cy="135" r="12"/>
  <circle cx="100" cy="135" r="5"/>
  <circle cx="135" cy="135" r="12"/>
  <circle cx="135" cy="135" r="5"/>
  <!-- coupling rods -->
  <line x1="65" y1="135" x2="100" y2="135"/>
  <line x1="100" y1="135" x2="135" y2="135"/>
  <!-- cowcatcher -->
  <polygon points="40,125 20,145 50,145"/>
  <!-- headlight -->
  <circle cx="48" cy="100" r="6"/>
  <!-- track -->
  <line x1="10" y1="148" x2="190" y2="148" stroke-width="2"/>
  <line x1="10" y1="152" x2="190" y2="152" stroke-width="2"/>
</svg>
