<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="#fff" stroke="#222" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- cone -->
  <path d="M85,140 L100,185 L115,140"/>
  <!-- cone ridges -->
  <line x1="88" y1="145" x2="100" y2="182"/>
  <line x1="94" y1="142" x2="100" y2="182"/>
  <line x1="106" y1="142" x2="100" y2="182"/>
  <line x1="112" y1="145" x2="100" y2="182"/>
  <!-- bottom scoop -->
  <circle cx="100" cy="135" r="28"/>
  <!-- top scoop -->
  <circle cx="100" cy="100" r="24"/>
  <!-- scoop overlap line -->
  <path d="M76,100 Q100,115 124,100" stroke-width="2"/>
  <!-- chocolate syrup -->
  <path d="M88,125 Q95,120 100,128 Q105,120 112,125"/>
  <path d="M82,112 Q92,105 100,112 Q108,105 118,112"/>
  <!-- sprinkles -->
  <rect x="85" y="90" width="3" height="8" rx="1" transform="rotate(25,85,90)"/>
  <rect x="95" y="85" width="3" height="8" rx="1" transform="rotate(-30,95,85)"/>
  <rect x="108" y="92" width="3" height="8" rx="1" transform="rotate(40,108,92)"/>
  <rect x="115" y="88" width="3" height="8" rx="1" transform="rotate(-15,115,88)"/>
  <rect x="88" y="100" width="3" height="8" rx="1" transform="rotate(10,88,100)"/>
  <rect x="112" y="102" width="3" height="8" rx="1" transform="rotate(-45,112,102)"/>
  <!-- cherry on top -->
  <circle cx="100" cy="72" r="8"/>
  <path d="M100,64 Q103,56 108,54" stroke-width="1.5"/>
</svg>
