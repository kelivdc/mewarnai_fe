<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="#fff" stroke="#222" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- body -->
  <ellipse cx="100" cy="140" rx="35" ry="30"/>
  <!-- head -->
  <circle cx="100" cy="85" r="28"/>
  <!-- left ear -->
  <ellipse cx="72" cy="70" rx="10" ry="22" transform="rotate(-15,72,70)"/>
  <!-- right ear -->
  <ellipse cx="128" cy="70" rx="10" ry="22" transform="rotate(15,128,70)"/>
  <!-- eyes -->
  <circle cx="90" cy="82" r="4"/>
  <circle cx="110" cy="82" r="4"/>
  <circle cx="90" cy="82" r="2" fill="#222"/>
  <circle cx="110" cy="82" r="2" fill="#222"/>
  <!-- nose -->
  <polygon points="100,90 96,95 104,95"/>
  <!-- cheeks -->
  <circle cx="85" cy="95" r="6"/>
  <circle cx="115" cy="95" r="6"/>
  <!-- front paws -->
  <ellipse cx="82" cy="165" rx="10" ry="8"/>
  <ellipse cx="118" cy="165" rx="10" ry="8"/>
  <!-- tail -->
  <circle cx="135" cy="130" r="8"/>
</svg>
